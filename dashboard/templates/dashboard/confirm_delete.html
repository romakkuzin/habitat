{% extends 'dashboard/base.html' %}
{% block title %}{{ title }} — Habits Productivity{% endblock %}
{% block content %}
<div class="card">
    <h1>{{ title }}</h1>
    <p>Вы действительно хотите удалить <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button class="button" type="submit" style="background:#dc2626;">Удалить</button>
            {% if cancel_args %}
                <a class="button" href="{% url cancel_url cancel_args.0 %}" style="background:#6b7280;">Отменить</a>
            {% else %}
                <a class="button" href="{% url cancel_url %}" style="background:#6b7280;">Отменить</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
