{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Продуктивность{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white shadow-sm">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
            <a href="{% url 'home' %}" class="text-xl font-semibold text-slate-900">Habits Productivity</a>
            <nav class="flex items-center gap-4 text-sm font-medium text-slate-600">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="text-slate-700 hover:text-slate-900">Дашборд</a>
                    <a href="{% url 'habit_list' %}" class="text-slate-700 hover:text-slate-900">Привычки</a>
                    <a href="{% url 'reports' %}" class="text-slate-700 hover:text-slate-900">Отчёты</a>
                    <a href="{% url 'logout' %}" class="rounded-full bg-sky-600 px-4 py-2 text-white hover:bg-sky-700">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}" class="rounded-full bg-sky-600 px-4 py-2 text-white hover:bg-sky-700">Войти</a>
                    <a href="{% url 'register' %}" class="rounded-full bg-slate-200 px-4 py-2 text-slate-700 hover:bg-slate-300">Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
