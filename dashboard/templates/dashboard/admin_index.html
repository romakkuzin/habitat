{% extends 'dashboard/base.html' %}

{% block content %}
<h1 class="text-2xl font-bold">Admin Dashboard</h1>
<div class="mt-4">
  <ul>
    <li>Users: {{ user_count }}</li>
    <li>Habits: {{ habit_count }}</li>
    <li>Sessions: {{ session_count }}</li>
  </ul>
</div>
<div class="mt-6">
  <a href="{% url 'dashboard_admin:users' %}" class="text-sky-600">Manage Users</a> |
  <a href="{% url 'dashboard_admin:habits' %}" class="text-sky-600">Manage Habits</a> |
  <a href="{% url 'dashboard_admin:sessions' %}" class="text-sky-600">Manage Sessions</a>
</div>
{% endblock %}
